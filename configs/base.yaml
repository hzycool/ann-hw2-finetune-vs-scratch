dataset:
  name: beans
  cache_dir: data/beans_cache
  image_size: 224
  batch_size: 8
  num_workers: 0
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  train_aug:
    horizontal_flip: 0.5
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.05

training:
  device: cpu
  seed: 42
  weight_decay: 0.0001
  head_epochs: 5
  full_epochs: 15
  scratch_epochs: 30
  head_lr: 0.001
  full_lr: 0.0001
  scratch_lr: 0.0003
  log_interval: 10

output:
  root_dir: outputs/runs

report:
  summary_dir: outputs/summary
  latex_dir: report/generated
